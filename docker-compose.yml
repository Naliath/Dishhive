# =============================================================================
# Dishhive - Docker Compose
# =============================================================================
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose down -v        # Stop and remove volumes (data)
#   docker-compose logs -f        # View logs
#   docker-compose up -d --build  # Rebuild and start
#
# Ports are deliberately offset from Freezy (app 5000, db 5432) so both
# applications can run side by side: Dishhive uses app 5100, db 5433.
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: dishhive-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dishhive
      POSTGRES_USER: dishhive
      POSTGRES_PASSWORD: dishhive_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dishhive -d dishhive"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # .NET 10 App (API + Angular Frontend)
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: dishhive-app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5100
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=dishhive;Username=dishhive;Password=dishhive_dev_password"
      # Optional Freezy integration; e.g. http://host.docker.internal:5000
      Freezy__BaseUrl: ""
      # Demo mode: seeds an empty database with 20 Dagelijkse Kost recipes and a
      # demo household (the Rocinante crew). Set to "false" for real use.
      Demo__Enabled: "true"
      # Optional AI week-plan suggestions; disabled while Ai__Provider is empty.
      # Providers: openai | anthropic | mistral | ollama | lmstudio | openai-compatible
      #   Ollama:    Ai__Provider=ollama    Ai__Model=llama3.1           Ai__BaseUrl=http://host.docker.internal:11434/v1
      #   OpenAI:    Ai__Provider=openai    Ai__Model=gpt-4o-mini        Ai__ApiKey=sk-...   (or OPENAI_API_KEY)
      #   Anthropic: Ai__Provider=anthropic Ai__Model=claude-opus-4-8    Ai__ApiKey=sk-ant-... (or ANTHROPIC_API_KEY)
      #   Mistral:   Ai__Provider=mistral   Ai__Model=mistral-small-latest Ai__ApiKey=...     (or MISTRAL_API_KEY)
      #   LM Studio: Ai__Provider=lmstudio  Ai__Model=<loaded model>     Ai__BaseUrl=http://host.docker.internal:1234/v1
      Ai__Provider: "lmstudio"
      Ai__ApiKey: ""
      Ai__BaseUrl: "http://host.docker.internal:1234/v1"
      Ai__Model: "qwen/qwen3.6-35b-a3b"
    ports:
      - "5100:5100"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
