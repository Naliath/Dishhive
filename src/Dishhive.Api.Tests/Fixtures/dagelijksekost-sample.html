<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spaghetti bolognese - Dagelijkse Kost</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "Spaghetti bolognese",
    "description": "Een klassieker uit de Italiaanse keuken: spaghetti bolognese met een rijke vleessaus. Perfect voor een doordeweekse maaltijd.",
    "recipeYield": "4 personen",
    "prepTime": "PT15M",
    "cookTime": "PT45M",
    "image": [
      "https://images.dagelijksekost.vrt.be/sample/spaghetti-bolognese-1200x900.jpg",
      "https://images.dagelijksekost.vrt.be/sample/spaghetti-bolognese-400x300.jpg"
    ],
    "video": {
      "@type": "VideoObject",
      "name": "Spaghetti bolognese",
      "embedUrl": "https://www.vrt.be/vrtmax/embed/spaghetti-bolognese-video"
    },
    "recipeIngredient": [
      "400 g spaghetti",
      "500 g rundergehakt",
      "1 ui, fijngehakt",
      "2 teentjes knoflook, geperst",
      "1 wortel, fijngehakt",
      "1 stengel selder, fijngehakt",
      "400 g gepelde tomaten (blik)",
      "2 el tomatenpuree",
      "100 ml rode wijn",
      "1 tl gedroogde oregano",
      "1 tl gedroogde basilicum",
      "zout en peper naar smaak",
      "olijfolie",
      "geraspte parmezaan om te serveren"
    ],
    "recipeInstructions": [
      {
        "@type": "HowToStep",
        "text": "Verhit een scheut olijfolie in een grote pan op middelhoog vuur. Voeg de ui, wortel en selder toe en bak 5 minuten tot ze zacht zijn."
      },
      {
        "@type": "HowToStep",
        "text": "Voeg de knoflook toe en bak nog 1 minuut."
      },
      {
        "@type": "HowToStep",
        "text": "Doe het rundergehakt in de pan en bak het rul, al roerend, tot het bruin is."
      },
      {
        "@type": "HowToStep",
        "text": "Voeg de tomatenpuree toe en bak 2 minuten mee. Blus met de rode wijn en laat 2 minuten inkoken."
      },
      {
        "@type": "HowToStep",
        "text": "Voeg de gepelde tomaten, oregano en basilicum toe. Breng op smaak met zout en peper. Laat de saus 30 minuten sudderen op laag vuur."
      },
      {
        "@type": "HowToStep",
        "text": "Kook ondertussen de spaghetti al dente volgens de verpakking. Giet af."
      },
      {
        "@type": "HowToStep",
        "text": "Serveer de spaghetti met de bolognesesaus en bestrooi met geraspte parmezaan."
      }
    ],
    "author": {
      "@type": "Person",
      "name": "Jeroen Meus"
    },
    "url": "https://dagelijksekost.vrt.be/gerechten/spaghetti-bolognese"
  }
  </script>
</head>
<body>
  <main>
    <h1>Spaghetti bolognese</h1>
    <p>Een klassieker uit de Italiaanse keuken.</p>
  </main>
</body>
</html>
